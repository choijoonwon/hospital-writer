<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>병원 마케팅 글쓰기 자동화</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>병원 마케팅 글쓰기 자동화</h1>
      <div id="status-badge" class="badge badge-loading">로딩 중...</div>
    </header>

    <div class="card">
      <h2>1. 환자 선택</h2>

      <div class="patient-select-layout">
        <!-- 왼쪽: 검색 영역 -->
        <div class="search-panel">
          <div class="field">
            <label>병원 검색</label>
            <div class="search-wrap">
              <span class="search-icon">🏥</span>
              <input type="text" id="hospital-search" placeholder="병원명 검색..." oninput="filterPatients()" autocomplete="off" />
              <button class="search-clear hidden" id="hospital-clear" onclick="clearHospitalSearch()">✕</button>
            </div>
          </div>

          <div class="field">
            <label>키워드 검색</label>
            <div class="search-wrap">
              <span class="search-icon">🔍</span>
              <input type="text" id="patient-search" placeholder="이름, 수술, 원장, 닉네임..." oninput="filterPatients()" autocomplete="off" />
              <button class="search-clear hidden" id="search-clear" onclick="clearSearch()">✕</button>
            </div>
          </div>

          <button id="refresh-btn" class="btn btn-secondary btn-refresh" onclick="loadPatients(true)">↺ 새로고침</button>
        </div>

        <!-- 오른쪽: 환자 리스트 -->
        <div id="patient-list" class="patient-list">
          <div class="patient-list-empty">로딩 중...</div>
        </div>
      </div>

      <!-- 선택된 환자 정보 -->
      <div id="patient-info" class="patient-info hidden">
        <div class="patient-info-header">
          <h3>환자 정보 요약</h3>
          <button class="btn-text" onclick="clearPatient()">선택 해제</button>
        </div>
        <div id="patient-details" class="details-grid"></div>
      </div>
    </div>

    <div class="card">
      <h2>2. 글 설정</h2>
      <div class="settings-grid">
        <div class="field settings-platform">
          <label>플랫폼 <span id="platform-hint" class="label-hint">환자를 먼저 선택하세요</span></label>
          <div id="platform-buttons" class="btn-group">
            <span class="platform-empty-msg">← 환자 선택 시 카페 목록이 여기에 표시됩니다</span>
          </div>
        </div>
        <div class="field">
          <label>글 종류</label>
          <div id="type-buttons" class="btn-group">
            <button class="toggle-btn" data-value="게시글" onclick="selectPostType(this)">게시글</button>
            <button class="toggle-btn" data-value="댓글" onclick="selectPostType(this)">댓글</button>
            <button class="toggle-btn" data-value="쪽지" onclick="selectPostType(this)">쪽지</button>
          </div>
        </div>
        <div class="field">
          <label>가격 언급</label>
          <div class="btn-group">
            <button class="toggle-btn active" id="price-yes" data-value="yes" onclick="selectPrice(this)">언급 가능</button>
            <button class="toggle-btn" id="price-no" data-value="no" onclick="selectPrice(this)">언급 금지</button>
          </div>
        </div>
        <div class="field">
          <label>병원명 표기</label>
          <div class="btn-group">
            <button class="toggle-btn active" id="hospital-full" data-value="full" onclick="selectHospitalFormat(this)">풀네임</button>
            <button class="toggle-btn" id="hospital-abbr" data-value="abbr" onclick="selectHospitalFormat(this)">초성</button>
          </div>
        </div>
        <div class="field">
          <label>온점 사용</label>
          <div class="btn-group">
            <button class="toggle-btn active" id="period-yes" data-value="yes" onclick="selectPeriod(this)">사용</button>
            <button class="toggle-btn" id="period-no" data-value="no" onclick="selectPeriod(this)">미사용</button>
          </div>
        </div>
      </div>

      <div class="row gap-lg">
        <div class="field">
          <label for="extra-context">추가 요청사항 (선택)</label>
          <input type="text" id="extra-context" placeholder="예: 회복 기간 위주로 써줘, 자연스럽게 병원 이름 한 번만 언급" />
        </div>
        <div class="field" style="max-width:140px;">
          <label for="char-limit">글자수 지정 (선택)</label>
          <input type="number" id="char-limit" placeholder="예: 300" min="50" max="2000" step="50" />
        </div>
      </div>

      <button class="btn btn-primary" onclick="generate()" id="generate-btn">
        글 생성하기
      </button>
    </div>

    <div class="card" id="result-card" style="display:none;">
      <div class="result-header">
        <h2>3. 생성된 글 초안</h2>
        <div class="result-actions">
          <button class="btn btn-secondary" onclick="generate()">재생성</button>
          <button class="btn btn-copy" onclick="copyText()">복사하기</button>
        </div>
      </div>
      <div id="result-meta" class="result-meta"></div>
      <textarea id="result-text" class="result-textarea" placeholder="글이 여기에 표시됩니다. 직접 수정도 가능합니다."></textarea>
      <div class="result-footer">
        <span id="char-count" class="char-count">0자</span>
        <div id="copy-toast" class="toast hidden">클립보드에 복사됐습니다!</div>
      </div>

      <!-- 검수 결과 -->
      <div id="review-panel" class="review-panel hidden">
        <div class="review-header">
          <span class="review-title">AI 검수 결과</span>
          <span id="review-badge" class="review-badge"></span>
        </div>
        <div id="review-items" class="review-items"></div>
        <div id="review-summary" class="review-summary"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
